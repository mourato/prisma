name: MeetingAssistant
options:
  bundleIdPrefix: com.meetingassistant
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

packages:
  MeetingAssistantCore:
    path: Packages/MeetingAssistantCore

targets:
  MeetingAssistant:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingassistant.app
        PRODUCT_NAME: MeetingAssistant
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/MeetingAssistant.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MeetingAssistantCore
    entitlements:
      path: App/MeetingAssistant.entitlements
