name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.agents/**'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - '.agents/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@c51a66b42381c6a2d118f10c2a9c7b7a5b3e6d0e # v1
        with:
          xcode-version: 'latest-stable'

      - name: Cache Homebrew packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-lint-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-lint-

      - name: Install SwiftLint/SwiftFormat
        run: brew install swiftlint swiftformat

      - name: Architecture checks
        run: make arch-check

      - name: Run Lint (strict)
        run: STRICT_LINT=1 make lint

      - name: PR heuristics (warnings only)
        if: github.event_name == 'pull_request'
        run: ./scripts/pr-checks.sh

  test:
    name: Test
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@c51a66b42381c6a2d118f10c2a9c7b7a5b3e6d0e # v1
        with:
          xcode-version: 'latest-stable'

      - name: Cache SwiftPM build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            Packages/MeetingAssistantCore/.build
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Packages/MeetingAssistantCore/Package.swift', 'Packages/MeetingAssistantCore/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Run Tests
        run: make ci-test
