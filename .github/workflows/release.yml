name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: macos-14

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@c51a66b42381c6a2d118f10c2a9c7b7a5b3e6d0e # v1
        with:
          xcode-version: 'latest-stable'

      - name: Generate Changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log ${LAST_TAG}..HEAD --oneline --format='- %s' 2>/dev/null || echo "No changes recorded")
          else
            CHANGELOG=$(git log --oneline --format='- %s' -10 || echo "Initial release")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Release App
        run: ./scripts/build-release.sh --ci

      - name: Create DMG
        run: ./scripts/create-dmg.sh --ci

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: MeetingAssistant-DMG
          path: dist/*.dmg

      - name: Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.dmg
          draft: true
          prerelease: false
          body: |
            ## Changes since last release

            ${{ steps.changelog.outputs.CHANGELOG }}
