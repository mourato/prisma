# Sparkle Release Workflow
#
# Triggers:
# - release.published: production publish path
# - workflow_dispatch: manual validation path (supports dry-run)
#
# Required GitHub Secrets (Phase 1):
#   SPARKLE_PRIVATE_KEY_B64  – base64 of EdDSA private key from Sparkle (preferred)
#   SPARKLE_PRIVATE_KEY      – raw EdDSA private key PEM (legacy fallback)
#
# Note:
#   This workflow currently publishes unsigned macOS app bundles (no Developer ID / notarization).
#   Sparkle EdDSA signatures are still generated for update archives.

name: Sparkle Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to validate/build (e.g., v0.3.3)"
        required: true
        type: string
      dry_run:
        description: "Run full pipeline but skip release upload and gh-pages push"
        required: false
        default: true
        type: boolean

concurrency:
  group: sparkle-release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions: {}

env:
  APP_NAME: Prisma
  SCHEME: MeetingAssistant
  XCODE_PROJECT: MeetingAssistant.xcodeproj
  ARCHIVE_PATH: build/Prisma.xcarchive
  XCODE_APP: /Applications/Xcode_16.4.app
  XCODE_VERSION: "16.4"
  DERIVED_DATA_PATH: /tmp/DerivedData

jobs:
  build:
    name: Build Release Inputs
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      dry_run: ${{ steps.release_meta.outputs.dry_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            DRY_RUN="false"
          else
            RELEASE_TAG="${{ github.event.inputs.tag }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::Release tag is required."
            exit 1
          fi

          if [ -z "${DRY_RUN}" ]; then
            DRY_RUN="true"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${RELEASE_TAG}"
          echo "Dry-run mode: ${DRY_RUN}"

      - name: Validate release tag is main HEAD
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release_meta.outputs.release_tag }}"

          git fetch --no-tags origin main
          git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"

          TAG_SHA="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          MAIN_SHA="$(git rev-parse origin/main)"

          if [ "$TAG_SHA" != "$MAIN_SHA" ]; then
            echo "::error::Release tag ${RELEASE_TAG} points to ${TAG_SHA}, but origin/main HEAD is ${MAIN_SHA}."
            echo "::error::Create release tags only from the latest main commit."
            exit 1
          fi

      - name: Checkout release tag commit
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release_meta.outputs.release_tag }}"
          git checkout --detach "refs/tags/${RELEASE_TAG}"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ${{ env.DERIVED_DATA_PATH }}/SourcePackages
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-${{ hashFiles('Packages/MeetingAssistantCore/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-

      - name: Run release parity gate (build + archive)
        id: release_parity
        run: |
          set -euo pipefail
          ./scripts/ci-release-parity.sh \
            --mode ci \
            --phase build-archive \
            --derived-data "${DERIVED_DATA_PATH}" \
            --archive-path "${ARCHIVE_PATH}" \
            --xcode-version "${XCODE_VERSION}" \
            --xcode-app "${XCODE_APP}" \
            --strict-xcode-version "${MA_CI_PARITY_STRICT_XCODE_VERSION:-0}" \
            --dry-run 0

      - name: Upload build outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-build-outputs
          path: |
            ${{ env.ARCHIVE_PATH }}
            build/tools/sparkle
          if-no-files-found: error
          retention-days: 14

      - name: Upload parity logs on failure
        if: failure() && steps.release_parity.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-parity-logs
          path: |
            build/ci-release-resolve-packages.log
            build/ci-release-build.log
            build/ci-release-archive.log
          if-no-files-found: warn
          retention-days: 14

  publish:
    name: Publish Sparkle Assets
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
      DRY_RUN: ${{ needs.build.outputs.dry_run }}
    steps:
      - name: Checkout release tag commit
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: sparkle-build-outputs
          path: /tmp/sparkle-build-outputs

      - name: Verify gh authentication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth status -h github.com

      - name: Run release parity package/appcast phase
        env:
          SPARKLE_PRIVATE_KEY_B64: ${{ secrets.SPARKLE_PRIVATE_KEY_B64 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=0
          if [ "${DRY_RUN}" = "true" ]; then
            DRY_RUN_FLAG=1
          fi

          ./scripts/ci-release-parity.sh \
            --mode ci \
            --phase package-appcast \
            --derived-data "${DERIVED_DATA_PATH}" \
            --archive-path "/tmp/sparkle-build-outputs/${ARCHIVE_PATH}" \
            --sparkle-tools-dir "/tmp/sparkle-build-outputs/build/tools/sparkle" \
            --release-tag "${RELEASE_TAG}" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}" \
            --dry-run "${DRY_RUN_FLAG}"

      - name: Upload zip to GitHub Release
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local base_sleep_seconds="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi

              local wait_seconds=$((base_sleep_seconds * attempt))
              echo "Attempt ${attempt} failed. Retrying in ${wait_seconds}s..."
              sleep "${wait_seconds}"
              attempt=$((attempt + 1))
            done
          }

          retry 3 10 gh release upload "${RELEASE_TAG}" "build/${APP_NAME}.zip" --clobber --repo "${GITHUB_REPOSITORY}"

      - name: Deploy appcast to gh-pages
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local base_sleep_seconds="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi

              local wait_seconds=$((base_sleep_seconds * attempt))
              echo "Attempt ${attempt} failed. Retrying in ${wait_seconds}s..."
              sleep "${wait_seconds}"
              attempt=$((attempt + 1))
            done
          }

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          GH_PAGES_DIR="/tmp/gh-pages"
          rm -rf "${GH_PAGES_DIR}"

          if git ls-remote --exit-code --heads "${REPO_URL}" gh-pages >/dev/null 2>&1; then
            retry 3 10 git clone --depth 1 --branch gh-pages "${REPO_URL}" "${GH_PAGES_DIR}"
          else
            retry 3 10 git clone --depth 1 "${REPO_URL}" "${GH_PAGES_DIR}"
            cd "${GH_PAGES_DIR}"
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          cp "${GITHUB_WORKSPACE}/build/appcast/appcast.xml" "${GH_PAGES_DIR}/appcast.xml"

          cd "${GH_PAGES_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml

          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
            exit 0
          fi

          git commit -m "chore: update appcast for ${RELEASE_TAG}"
          retry 3 10 git push origin gh-pages

      - name: Dry-run summary
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          echo "Dry-run completed for tag ${RELEASE_TAG}."
          if [ "${APPCAST_SKIPPED_REASON:-}" = "unsigned_app" ]; then
            echo "Appcast generation was skipped because the archive is not Apple-signed yet."
          elif [ -n "${APPCAST_SKIPPED_REASON:-}" ]; then
            echo "Appcast generation was skipped (reason: ${APPCAST_SKIPPED_REASON})."
          fi
          echo "Skipped release asset upload and gh-pages deployment."

      - name: Upload publish diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-publish-diagnostics
          path: |
            build/${{ env.APP_NAME }}.zip
            build/appcast
          if-no-files-found: warn
          retention-days: 14
