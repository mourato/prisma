# Sparkle Release Workflow
#
# Triggers:
# - release.published: production publish path
# - workflow_dispatch: manual validation path (supports dry-run)
#
# Required GitHub Secrets (Phase 1):
#   SPARKLE_PRIVATE_KEY_B64  – base64 of EdDSA private key from Sparkle (preferred)
#   SPARKLE_PRIVATE_KEY      – raw EdDSA private key PEM (legacy fallback)
#
# TODO (Phase 2): Add Developer ID signing + notarization.

name: Sparkle Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to validate/build (e.g., v0.3.3)"
        required: true
        type: string
      dry_run:
        description: "Run full pipeline but skip release upload and gh-pages push"
        required: false
        default: true
        type: boolean

concurrency:
  group: sparkle-release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions: {}

env:
  APP_NAME: Prisma
  SCHEME: MeetingAssistant
  XCODE_PROJECT: MeetingAssistant.xcodeproj
  ARCHIVE_PATH: build/Prisma.xcarchive
  XCODE_APP: /Applications/Xcode_16.4.app
  XCODE_VERSION: "16.4"
  DERIVED_DATA_PATH: /tmp/DerivedData

jobs:
  build:
    name: Build Release Inputs
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      dry_run: ${{ steps.release_meta.outputs.dry_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            DRY_RUN="false"
          else
            RELEASE_TAG="${{ github.event.inputs.tag }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::Release tag is required."
            exit 1
          fi

          if [ -z "${DRY_RUN}" ]; then
            DRY_RUN="true"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${RELEASE_TAG}"
          echo "Dry-run mode: ${DRY_RUN}"

      - name: Validate release tag is main HEAD
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release_meta.outputs.release_tag }}"

          git fetch --no-tags origin main
          git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"

          TAG_SHA="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          MAIN_SHA="$(git rev-parse origin/main)"

          if [ "$TAG_SHA" != "$MAIN_SHA" ]; then
            echo "::error::Release tag ${RELEASE_TAG} points to ${TAG_SHA}, but origin/main HEAD is ${MAIN_SHA}."
            echo "::error::Create release tags only from the latest main commit."
            exit 1
          fi

      - name: Checkout release tag commit
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release_meta.outputs.release_tag }}"
          git checkout --detach "refs/tags/${RELEASE_TAG}"

      - name: Select pinned Xcode
        run: |
          set -euo pipefail

          if [ ! -d "${XCODE_APP}" ]; then
            echo "::error::Pinned Xcode app not found at ${XCODE_APP}."
            exit 1
          fi

          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"

          CURRENT_XCODE_VERSION="$(xcodebuild -version | awk 'NR==1 { print $2 }')"
          if [ "${CURRENT_XCODE_VERSION}" != "${XCODE_VERSION}" ]; then
            echo "::error::Expected Xcode ${XCODE_VERSION}, got ${CURRENT_XCODE_VERSION}."
            exit 1
          fi

          xcodebuild -version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ${{ env.DERIVED_DATA_PATH }}/SourcePackages
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-${{ hashFiles('Packages/MeetingAssistantCore/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-

      - name: Resolve SPM dependencies
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project "${XCODE_PROJECT}" \
            -scheme "${SCHEME}" \
            -derivedDataPath "${DERIVED_DATA_PATH}"

      - name: Locate Sparkle tools deterministically
        run: |
          set -euo pipefail

          SPARKLE_TOOL="$(find "${DERIVED_DATA_PATH}/SourcePackages" -type f -name generate_appcast | head -n 1)"
          if [ -z "${SPARKLE_TOOL}" ]; then
            echo "::error::Could not locate Sparkle generate_appcast under ${DERIVED_DATA_PATH}/SourcePackages."
            exit 1
          fi

          SPARKLE_BIN_DIR="$(dirname "${SPARKLE_TOOL}")"
          mkdir -p build/tools/sparkle
          cp -R "${SPARKLE_BIN_DIR}/." build/tools/sparkle/
          chmod +x build/tools/sparkle/generate_appcast

      - name: Build release gate
        id: build_release_gate
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "${XCODE_PROJECT}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/build-release.log

      - name: Archive app
        id: archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "${XCODE_PROJECT}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -archivePath "${ARCHIVE_PATH}" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/archive.log

      - name: Upload build outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-build-outputs
          path: |
            ${{ env.ARCHIVE_PATH }}
            build/tools/sparkle
          if-no-files-found: error
          retention-days: 14

      - name: Upload build gate log on failure
        if: failure() && steps.build_release_gate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-build-gate-log
          path: /tmp/build-release.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload archive log on failure
        if: failure() && steps.archive.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-archive-log
          path: /tmp/archive.log
          if-no-files-found: warn
          retention-days: 14

  publish:
    name: Publish Sparkle Assets
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
      DRY_RUN: ${{ needs.build.outputs.dry_run }}
    steps:
      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: sparkle-build-outputs
          path: /tmp/sparkle-build-outputs

      - name: Verify gh authentication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth status -h github.com

      - name: Create distribution zip
        run: |
          set -euo pipefail

          ARCHIVE_ROOT="/tmp/sparkle-build-outputs/${ARCHIVE_PATH}"
          if [ ! -d "${ARCHIVE_ROOT}" ]; then
            ARCHIVE_BASENAME="$(basename "${ARCHIVE_PATH}")"
            ARCHIVE_ROOT="$(find /tmp/sparkle-build-outputs -type d -name "${ARCHIVE_BASENAME}" | head -n 1)"
          fi

          if [ -z "${ARCHIVE_ROOT:-}" ] || [ ! -d "${ARCHIVE_ROOT}" ]; then
            echo "::error::Archive not found under /tmp/sparkle-build-outputs (expected ${ARCHIVE_PATH})."
            find /tmp/sparkle-build-outputs -maxdepth 4 -type d | sort
            exit 1
          fi

          APP_BUNDLE="$(find "${ARCHIVE_ROOT}" -type d -path '*/Products/Applications/*.app' | head -n 1)"
          if [ ! -d "${APP_BUNDLE}" ]; then
            echo "::error::App bundle not found inside archive ${ARCHIVE_ROOT}."
            find "${ARCHIVE_ROOT}" -maxdepth 5 -type d | sort
            exit 1
          fi

          mkdir -p build
          ditto -c -k --sequesterRsrc --keepParent "${APP_BUNDLE}" "build/${APP_NAME}.zip"

          mkdir -p build/appcast
          cp "build/${APP_NAME}.zip" build/appcast/

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY_B64: ${{ secrets.SPARKLE_PRIVATE_KEY_B64 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SPARKLE_PRIVATE_KEY_B64:-}" ] && [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing Sparkle private key secret. Configure SPARKLE_PRIVATE_KEY_B64 (preferred) or SPARKLE_PRIVATE_KEY (legacy)."
            exit 1
          fi

          SPARKLE_BIN="/tmp/sparkle-build-outputs/build/tools/sparkle"
          if [ ! -d "${SPARKLE_BIN}" ]; then
            SPARKLE_BIN="$(find /tmp/sparkle-build-outputs -type d -path '*/tools/sparkle' | head -n 1)"
          fi

          APPCAST_TOOL="${SPARKLE_BIN}/generate_appcast"
          if [ ! -f "${APPCAST_TOOL}" ]; then
            APPCAST_TOOL="$(find /tmp/sparkle-build-outputs -type f -name generate_appcast | head -n 1)"
          fi

          if [ -z "${APPCAST_TOOL:-}" ] || [ ! -f "${APPCAST_TOOL}" ]; then
            echo "::error::Sparkle generate_appcast binary not found in downloaded artifacts."
            find /tmp/sparkle-build-outputs -maxdepth 6 -type d | sort
            exit 1
          fi
          chmod +x "${APPCAST_TOOL}"

          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          KEY_PATH="/tmp/sparkle_ed25519.pem"
          cleanup() {
            rm -f "${KEY_PATH}"
          }
          trap cleanup EXIT

          if [ -n "${SPARKLE_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "${SPARKLE_PRIVATE_KEY_B64}" | decode_base64 > "${KEY_PATH}"
          else
            printf '%s' "${SPARKLE_PRIVATE_KEY}" > "${KEY_PATH}"
          fi
          chmod 600 "${KEY_PATH}"

          DOWNLOAD_URL_PREFIX="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          "${APPCAST_TOOL}" \
            --ed-key-file "${KEY_PATH}" \
            --download-url-prefix "${DOWNLOAD_URL_PREFIX}/" \
            build/appcast

      - name: Upload zip to GitHub Release
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local base_sleep_seconds="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi

              local wait_seconds=$((base_sleep_seconds * attempt))
              echo "Attempt ${attempt} failed. Retrying in ${wait_seconds}s..."
              sleep "${wait_seconds}"
              attempt=$((attempt + 1))
            done
          }

          retry 3 10 gh release upload "${RELEASE_TAG}" "build/${APP_NAME}.zip" --clobber

      - name: Deploy appcast to gh-pages
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            local base_sleep_seconds="$2"
            shift 2

            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::Command failed after ${attempt} attempts: $*"
                return 1
              fi

              local wait_seconds=$((base_sleep_seconds * attempt))
              echo "Attempt ${attempt} failed. Retrying in ${wait_seconds}s..."
              sleep "${wait_seconds}"
              attempt=$((attempt + 1))
            done
          }

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          GH_PAGES_DIR="/tmp/gh-pages"
          rm -rf "${GH_PAGES_DIR}"

          if git ls-remote --exit-code --heads "${REPO_URL}" gh-pages >/dev/null 2>&1; then
            retry 3 10 git clone --depth 1 --branch gh-pages "${REPO_URL}" "${GH_PAGES_DIR}"
          else
            retry 3 10 git clone --depth 1 "${REPO_URL}" "${GH_PAGES_DIR}"
            cd "${GH_PAGES_DIR}"
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          cp "${GITHUB_WORKSPACE}/build/appcast/appcast.xml" "${GH_PAGES_DIR}/appcast.xml"

          cd "${GH_PAGES_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml

          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
            exit 0
          fi

          git commit -m "chore: update appcast for ${RELEASE_TAG}"
          retry 3 10 git push origin gh-pages

      - name: Dry-run summary
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          echo "Dry-run completed for tag ${RELEASE_TAG}."
          echo "Skipped release asset upload and gh-pages deployment."

      - name: Upload publish diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-publish-diagnostics
          path: |
            build/${{ env.APP_NAME }}.zip
            build/appcast
          if-no-files-found: warn
          retention-days: 14
