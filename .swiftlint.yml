disabled_rules:
  - nesting
  - todo
  - identifier_name

opt_in_rules:
  - empty_string
  - explicit_init
  - redundant_nil_coalescing
  - implicitly_unwrapped_optional
  - fatal_error_message
  - first_where
  - number_separator
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

line_length:
  warning: 140
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 400
  error: 600

cyclomatic_complexity:
  warning: 15
  error: 25

included:
  - Sources
  - Tests

excluded:
  - Sources/RepoBar/API/Generated
  - "*/Generated/*"
  - .build
  - docs

analyzer_rules:
  - unused_declaration
  - unused_import

reporter: "xcode"
