disabled_rules:
  - nesting
  - todo
  - identifier_name
  - file_name
  - line_length
  - opening_brace
  - implicitly_unwrapped_optional
  - blanket_disable_command
  - superfluous_disable_command
  - orphaned_doc_comment

opt_in_rules:
  - empty_string
  - explicit_init
  - redundant_nil_coalescing
  - fatal_error_message
  - first_where
  - number_separator
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 400
  error: 600

cyclomatic_complexity:
  warning: 15
  error: 25

included:
  - App
  - Packages

excluded:
  - Sources/RepoBar/API/Generated
  - "*/Generated/*"
  - "**/GeneratedMocks.swift"
  - .build
  - "**/.build/**"
  - Packages/MeetingAssistantCore/.build
  - docs

analyzer_rules:
  - unused_declaration
  - unused_import

reporter: "xcode"

trailing_comma:
  mandatory_comma: true
